<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: hsl(230,25%,7%);
  --fg: hsl(220,20%,92%);
  --card: hsl(230,20%,12%);
  --card-fg: hsl(220,20%,92%);
  --primary: hsl(262,80%,60%);
  --primary-fg: #fff;
  --secondary: hsl(230,20%,16%);
  --secondary-fg: hsl(220,20%,85%);
  --muted: hsl(230,15%,18%);
  --muted-fg: hsl(220,10%,55%);
  --accent: hsl(175,70%,45%);
  --destructive: hsl(0,72%,55%);
  --border: hsl(230,15%,20%);
  --glass-bg: hsla(230,20%,14%,0.6);
  --glass-border: hsla(220,20%,92%,0.08);
  --grad-primary: linear-gradient(135deg,hsl(262,80%,60%),hsl(200,80%,55%));
  --grad-danger: linear-gradient(135deg,hsl(0,72%,55%),hsl(30,80%,55%));
  --grad-warning: linear-gradient(135deg,hsl(40,80%,55%),hsl(30,80%,55%));
  --grad-success: linear-gradient(135deg,hsl(150,60%,45%),hsl(175,70%,45%));
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
.app{min-height:100vh;display:flex;flex-direction:column;position:relative}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0}
.ambient .blob1{position:absolute;top:-20%;left:-10%;width:500px;height:500px;border-radius:50%;background:hsla(262,80%,60%,0.05);filter:blur(120px)}
.ambient .blob2{position:absolute;bottom:-20%;right:-10%;width:400px;height:400px;border-radius:50%;background:hsla(175,70%,45%,0.05);filter:blur(120px)}
.content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}
.glass{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.grad-primary{background:var(--grad-primary)}
.grad-text{background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn{border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:hover{transform:scale(1.05)}.btn:active{transform:scale(.95)}
.hidden{display:none!important}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 20px hsla(262,80%,60%,0.3)}50%{box-shadow:0 0 40px hsla(262,80%,60%,0.6)}}
.anim-fade-in-up{animation:fadeInUp .6s ease forwards}
.anim-slide-left{animation:slideInLeft .4s ease forwards}
.anim-slide-right{animation:slideInRight .4s ease forwards}
.anim-scale-in{animation:scaleIn .4s ease forwards}
.anim-pulse{animation:pulseGlow 2s ease-in-out infinite}

/* Welcome */
#welcome{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
#welcome .icon{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 32px}
#welcome h1{font-size:clamp(2rem,6vw,3rem);font-weight:800;margin-bottom:16px}
#welcome .sub{color:var(--muted-fg);font-size:clamp(1rem,3vw,1.25rem);margin-bottom:40px;line-height:1.6}
#welcome .start-btn{background:var(--grad-primary);color:var(--primary-fg);font-weight:600;font-size:1.125rem;padding:16px 40px;border-radius:16px}
#welcome .start-btn:hover{box-shadow:0 0 30px hsla(262,80%,60%,0.4)}
#welcome .meta{color:var(--muted-fg);opacity:.6;font-size:.875rem;margin-top:32px}

/* Chat */
#chat{flex:1;display:flex;flex-direction:column;max-width:512px;margin:0 auto;width:100%}
.chat-header{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.chat-header .num{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem;color:var(--primary-fg)}
.chat-header .info{flex:1}
.chat-header .info p{font-size:.875rem;font-weight:500}
.progress-bar{width:100%;height:6px;background:var(--muted);border-radius:99px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .7s ease}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:.875rem;line-height:1.5}
.msg-context{text-align:center;font-size:.75rem;color:var(--muted-fg);opacity:.7;padding:8px 24px;max-width:100%;align-self:center}
.msg-child{align-self:flex-start;background:var(--secondary);color:var(--secondary-fg);border-bottom-left-radius:4px}
.msg-user{align-self:flex-end;color:var(--primary-fg);border-bottom-right-radius:4px}
.msg-feedback{align-self:center;padding:12px 20px;border-radius:16px;text-align:center}
.msg-feedback .tag{font-weight:600;display:block;margin-bottom:4px}
.msg-feedback .fb-text{opacity:.9;font-size:.875rem}
.chat-options{padding:8px 16px 24px;display:flex;flex-direction:column;gap:8px}
.opt-btn{width:100%;text-align:left;padding:12px 16px;border-radius:16px;font-size:.875rem;color:var(--fg);transition:all .2s}
.opt-btn:hover{border-color:hsla(262,80%,60%,0.4);transform:scale(1.02)}
.opt-btn:active{transform:scale(.98)}
.opt-btn .label{font-weight:600;color:var(--primary);margin-right:8px}

/* Result */
#result{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 24px 48px}
#result .inner{max-width:420px;width:100%;display:flex;flex-direction:column;gap:20px}
.score-circle{width:112px;height:112px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.score-circle span{font-size:1.75rem;font-weight:700;color:var(--primary-fg)}
.profile-emoji{font-size:3rem;text-align:center;margin-bottom:8px}
.profile-title{font-size:1.5rem;font-weight:700;text-align:center}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;padding:16px;border-radius:16px}
.stats .val{font-size:1.125rem;font-weight:700}
.stats .lbl{font-size:.75rem;color:var(--muted-fg)}
.desc-card,.rec-card{padding:20px;border-radius:16px}
.desc-card p{font-size:.875rem;color:var(--secondary-fg);line-height:1.6}
.rec-card h3{font-weight:600;font-size:.875rem;margin-bottom:12px}
.rec-item{display:flex;gap:12px;font-size:.875rem;color:var(--secondary-fg);margin-bottom:8px}
.rec-item .n{color:var(--primary);font-weight:700;flex-shrink:0}
.actions{display:flex;gap:12px}
.actions .btn{flex:1;padding:12px;border-radius:16px;font-weight:600;font-size:.875rem;text-align:center}
.share-btn{color:var(--primary-fg)}
.restart-btn{color:var(--fg)}
</style>
</head>
<body>

  <div class="ambient"><div class="blob1"></div><div class="blob2"></div></div>
  <div class="content" id="app"></div>

<script>
// === DATA ===
const scenarios=[{id:1,context:"Çocuğunuz son günlerde odasından çıkmıyor, arkadaşlarıyla görüşmüyor.",childMessage:"Bırak beni... Kimseyle konuşmak istemiyorum.",options:[{label:"A",text:"Hemen odandan çık! Bu davranış kabul edilemez!",type:"reaktif",points:0,feedback:"Baskıcı tepki çocuğu daha da içine kapanmaya iter.",tag:"❌ Risk artırır"},{label:"B",text:"Tamam, canın istediğinde çıkarsın.",type:"kacinan",points:1,feedback:"Sorunu görmezden gelmek çözüm üretmez.",tag:"⚠️ Yetersiz"},{label:"C",text:"Seni rahatsız eden bir şey olduğunu görüyorum. Hazır olduğunda konuşabiliriz.",type:"saglikli",points:2,feedback:"Çocuğun duygusunu onaylayıp alan tanımak güven inşa eder.",tag:"✅ Sağlıklı"}]},{id:2,context:"Çocuğunuz sınavdan düşük not aldıktan sonra öfkeyle kapıyı çarpıyor.",childMessage:"Bu hayat çok saçma! Hiçbir şey işe yaramıyor!",options:[{label:"A",text:"Kapıyı bir daha çarparsan telefonunu alırım!",type:"reaktif",points:0,feedback:"Ceza tehdidi öfkeyi bastırır ama çözmez.",tag:"❌ Risk artırır"},{label:"B",text:"Neyse, sakinleşince konuşuruz artık.",type:"kacinan",points:1,feedback:"Ertelemek bazen gereklidir ama sürekli yapılırsa bağ zayıflar.",tag:"⚠️ Yetersiz"},{label:"C",text:"Çok sinirlenmişsin, bu kadar üzülmen normal. Birlikte bakalım ne yapabiliriz.",type:"saglikli",points:2,feedback:"Duyguyu adlandırmak ve çözüm ortaklığı sunmak iyileştirir.",tag:"✅ Sağlıklı"}]},{id:3,context:"Çocuğunuz saatlerce tablet/telefon başından kalkmıyor.",childMessage:"5 dakika daha... Lütfen, herkes oynuyor!",options:[{label:"A",text:"Ver şunu! Bir daha elini süremezsin!",type:"reaktif",points:0,feedback:"Ani el koyma güven kırar ve isyana yol açar.",tag:"❌ Risk artırır"},{label:"B",text:"Tamam tamam, biraz daha oyna.",type:"kacinan",points:1,feedback:"Sınır koyamamak bağımlılık riskini artırır.",tag:"⚠️ Yetersiz"},{label:"C",text:"Anlaşmamızı hatırlıyorsun değil mi? 5 dakika sonra birlikte kapatacağız.",type:"saglikli",points:2,feedback:"Önceden belirlenmiş kurallarla tutarlı sınır koymak sağlıklıdır.",tag:"✅ Sağlıklı"}]},{id:4,context:"Çocuğunuz size kızgın bir şekilde bağırıyor.",childMessage:"Sen beni hiç anlamıyorsun! Keşke başka ailem olsaydı!",options:[{label:"A",text:"Bir daha böyle konuşursan görürsün! Saygısızlık yapma!",type:"reaktif",points:0,feedback:"Tehdit ve baskı iletişim kapısını kapatır.",tag:"❌ Risk artırır"},{label:"B",text:"Ne bileyim, ne istiyorsun söyle o zaman.",type:"kacinan",points:1,feedback:"Yüzeysel yanıt çocuğun duygu derinliğini karşılamaz.",tag:"⚠️ Yetersiz"},{label:"C",text:"Bu sözler beni üzüyor ama seni dinlemek istiyorum. Neden böyle hissediyorsun?",type:"saglikli",points:2,feedback:"Kendi duygunu ifade edip merak göstermek karşılıklı saygıyı öğretir.",tag:"✅ Sağlıklı"}]},{id:5,context:"Çocuğunuz ağlayarak geliyor, okulda arkadaşları onu dışlamış.",childMessage:"Kimse benimle oynamıyor... Herhalde ben kötüyüm.",options:[{label:"A",text:"Ağlama! Sen de onlarla oynama, görsünler!",type:"reaktif",points:0,feedback:"Duyguyu bastırmak ve intikam öğretmek zararlıdır.",tag:"❌ Risk artırır"},{label:"B",text:"Olur böyle şeyler, takma kafana.",type:"kacinan",points:1,feedback:"Küçümsemek çocuğun acısını geçersiz kılar.",tag:"⚠️ Yetersiz"},{label:"C",text:"Bu çok üzücü olmalı. Sen kötü değilsin. Neler olduğunu anlatır mısın?",type:"saglikli",points:2,feedback:"Empati ve merak göstermek duygusal güvenlik sağlar.",tag:"✅ Sağlıklı"}]},{id:6,context:"Çocuğunuz gece geç saatte uyuyamadığını söylüyor.",childMessage:"Korkuyorum... Ya kötü bir şey olursa?",options:[{label:"A",text:"Saçmalama, korkacak bir şey yok! Uyu artık!",type:"reaktif",points:0,feedback:"Korkuyu reddetmek güvensizliği derinleştirir.",tag:"❌ Risk artırır"},{label:"B",text:"Hadi yat artık, yarın okul var.",type:"kacinan",points:1,feedback:"Duyguyu es geçmek yalnızlık hissi yaratır.",tag:"⚠️ Yetersiz"},{label:"C",text:"Korkmak çok doğal. Yanındayım. Ne seni korkutuyor, birlikte konuşalım mı?",type:"saglikli",points:2,feedback:"Korkuyu normalleştirmek ve varlık göstermek güven inşa eder.",tag:"✅ Sağlıklı"}]},{id:7,context:"Çocuğunuz yeni bir aktivite denemek istemiyor, hep 'yapamam' diyor.",childMessage:"Denemeye gerek yok, zaten başaramayacağım...",options:[{label:"A",text:"Ne demek yapamam? Tembel tembel oturma, kalk dene!",type:"reaktif",points:0,feedback:"Etiketlemek ve zorlamak öz güveni daha da kırar.",tag:"❌ Risk artırır"},{label:"B",text:"Peki, istemiyorsan zorlamayım.",type:"kacinan",points:1,feedback:"Desteksiz bırakmak kaçınma davranışını pekiştirir.",tag:"⚠️ Yetersiz"},{label:"C",text:"Başaramamaktan korkman anlaşılır. Küçük bir adımla başlayalım, yanında olurum.",type:"saglikli",points:2,feedback:"Korkuyu onaylamak ve küçük adım önermek cesaret verir.",tag:"✅ Sağlıklı"}]}];

// === STATE ===
let currentScreen="welcome";
let currentScenario=0;
let messages=[];
let showOptions=false;
let scores={totalScore:0,reaktifCount:0,kacinanCount:0,saglikliCount:0};
const app=document.getElementById("app");

// === RENDER ===
function render(){
  if(currentScreen==="welcome") renderWelcome();
  else if(currentScreen==="chat") renderChat();
  else renderResult();
}

function renderWelcome(){
  app.innerHTML=`
  <div id="welcome" class="anim-fade-in-up">
    <div>
      <div class="icon grad-primary anim-pulse">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/><line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </div>
      <h1 class="grad-text">Ebeveyn Radar</h1>
      <p class="sub">Çocuğunun verdiği sinyalleri gerçekten fark edebiliyor musun?</p>
      <button class="btn start-btn" onclick="startChat()">Başla</button>
      <p class="meta">7 senaryo · ~3 dakika · Kişisel analiz</p>
    </div>
  </div>`;
}

function startChat(){
  currentScreen="chat";
  currentScenario=0;
  messages=[];
  showOptions=false;
  scores={totalScore:0,reaktifCount:0,kacinanCount:0,saglikliCount:0};
  render();
  startScenario();
}

function startScenario(){
  showOptions=false;
  const s=scenarios[currentScenario];
  setTimeout(()=>{messages.push({type:"context",text:s.context});renderChatMessages()},300);
  setTimeout(()=>{messages.push({type:"child",text:s.childMessage});renderChatMessages()},1200);
  setTimeout(()=>{showOptions=true;renderChatOptions()},2000);
}

function renderChat(){
  const s=scenarios[currentScenario];
  const progress=((currentScenario+1)/scenarios.length)*100;
  app.innerHTML=`
  <div id="chat">
    <div class="chat-header glass">
      <div class="num grad-primary">${currentScenario+1}</div>
      <div class="info">
        <p>Senaryo ${currentScenario+1}/${scenarios.length}</p>
        <div class="progress-bar"><div class="progress-fill grad-primary" style="width:${progress}%"></div></div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-options" id="chatOptions"></div>
  </div>`;
  renderChatMessages();
  renderChatOptions();
}

function renderChatMessages(){
  const el=document.getElementById("chatMessages");
  if(!el)return;
  el.innerHTML=messages.map((m,i)=>{
    if(m.type==="context") return `<div class="msg-context anim-slide-left" style="animation-delay:${i*0.05}s">📋 ${m.text}</div>`;
    if(m.type==="child") return `<div class="msg msg-child anim-slide-left">👧 ${m.text}</div>`;
    if(m.type==="user") return `<div class="msg msg-user grad-primary anim-slide-right">${m.text}</div>`;
    if(m.type==="feedback"){
      const bg=m.tag.includes("✅")?"var(--grad-success)":m.tag.includes("⚠️")?"var(--grad-warning)":"var(--grad-danger)";
      return `<div class="msg-feedback anim-scale-in" style="background:${bg}"><span class="tag">${m.tag}</span><span class="fb-text">${m.text}</span></div>`;
    }
    return "";
  }).join("");
  el.scrollTop=el.scrollHeight;
}

function renderChatOptions(){
  const el=document.getElementById("chatOptions");
  if(!el)return;
  if(!showOptions){el.innerHTML="";return;}
  const s=scenarios[currentScenario];
  el.innerHTML=s.options.map((o,i)=>`
    <button class="btn opt-btn glass anim-fade-in-up" style="animation-delay:${i*0.1}s" onclick="handleChoice(${i})">
      <span class="label">${o.label}.</span>${o.text}
    </button>
  `).join("");
}

function handleChoice(idx){
  const s=scenarios[currentScenario];
  const o=s.options[idx];
  showOptions=false;
  renderChatOptions();
  messages.push({type:"user",text:o.text});
  renderChatMessages();
  scores.totalScore+=o.points;
  if(o.type==="reaktif")scores.reaktifCount++;
  else if(o.type==="kacinan")scores.kacinanCount++;
  else scores.saglikliCount++;
  setTimeout(()=>{messages.push({type:"feedback",text:o.feedback,tag:o.tag});renderChatMessages()},800);
  setTimeout(()=>{
    if(currentScenario<scenarios.length-1){
      const el=document.getElementById("chatMessages");
      if(el)el.style.opacity="0";
      setTimeout(()=>{
        messages=[];
        currentScenario++;
        render();
        startScenario();
      },500);
    } else {
      currentScreen="result";
      render();
    }
  },3000);
}

function renderResult(){
  const maxScore=scenarios.length*2;
  const pct=Math.round((scores.totalScore/maxScore)*100);
  const {reaktifCount:r,kacinanCount:k,saglikliCount:s}=scores;
  let profile;
  if(s>=r&&s>=k) profile={title:"Dengeli Ebeveyn",emoji:"🌟",grad:"var(--grad-success)",desc:"Çocuğunuzun duygularını fark ediyor, adlandırıyor ve alan tanıyorsunuz. Empati ve sınır arasında sağlıklı bir denge kurabiliyorsunuz.",recs:["Duygusal farkındalık egzersizlerine devam edin — çocuğunuzla günlük 'duygu check-in'i yapın.","Çocuğunuzun olumlu davranışlarını ödüllendirmeye özen gösterin.","Kendinize de duygusal alan tanıyın — ebeveyn tükenmişliğine dikkat edin."]};
  else if(r>=k) profile={title:"Reaktif Ebeveyn",emoji:"⚡",grad:"var(--grad-danger)",desc:"Çocuğunuzun davranışlarına güçlü ve anlık tepkiler verme eğilimindesiniz. Bu tepkiler kısa vadede kontrol sağlasa da uzun vadede çocuğun kendini ifade etmesini engelleyebilir.",recs:["Tepki vermeden önce 3 saniye durun — 'dur-düşün-yanıtla' tekniğini uygulayın.","Öfke anlarında odadan kısa süre ayrılmak sizi ve çocuğunuzu korur.","Bir çocuk psikoloğu ile düzenli görüşme planlamayı düşünün."]};
  else profile={title:"Kaçınan Ebeveyn",emoji:"🌫️",grad:"var(--grad-warning)",desc:"Çatışmadan kaçınma ve sorunları erteleme eğilimindesiniz. Bu yaklaşım kısa vadede huzur sağlasa da çocuğunuzun duygusal ihtiyaçlarını karşılayamayabilir.",recs:["Her gün en az 15 dakika çocuğunuzla birebir, ekransız vakit geçirin.","Zor konularda 'merak cümleleri' kullanın: 'Bu konuda ne hissediyorsun?'","Sınır koymak sevgi göstermenin bir şeklidir — tutarlı kurallar belirleyin."]};

  const shareText=encodeURIComponent(`Ebeveyn Radar'da "${profile.title}" çıktım (%${pct}). Sen ne çıktın? 🎯`);

  app.innerHTML=`
  <div id="result">
    <div class="inner anim-fade-in-up">
      <div style="text-align:center">
        <div class="score-circle anim-scale-in" style="background:${profile.grad}"><span>%${pct}</span></div>
        <div class="profile-emoji">${profile.emoji}</div>
        <div class="profile-title grad-text">${profile.title}</div>
      </div>
      <div class="stats glass">
        <div><div class="val" style="color:var(--destructive)">${r}</div><div class="lbl">Reaktif</div></div>
        <div><div class="val" style="color:hsl(40,80%,55%)">${k}</div><div class="lbl">Kaçınan</div></div>
        <div><div class="val" style="color:var(--accent)">${s}</div><div class="lbl">Sağlıklı</div></div>
      </div>
      <div class="desc-card glass"><p>${profile.desc}</p></div>
      <div class="rec-card glass">
        <h3>💡 Kişisel Öneriler</h3>
        ${profile.recs.map((rc,i)=>`<div class="rec-item"><span class="n">${i+1}.</span><p>${rc}</p></div>`).join("")}
      </div>
      <div class="actions">
        <button class="btn share-btn grad-primary" onclick="handleShare()">📤 Paylaş</button>
        <button class="btn restart-btn glass" onclick="startChat()">🔄 Tekrar Dene</button>
      </div>
    </div>
  </div>`;

  window._shareText=decodeURIComponent(shareText);
}

async function handleShare(){
  const t=window._shareText;
  if(navigator.share){try{await navigator.share({text:t})}catch{}}
  else{await navigator.clipboard.writeText(t);alert("Metin panoya kopyalandı!")}
}

// === INIT ===
render();
</script>
</body>
</html>
